# ===== TonbilAiOS Nginx Konfigurasyonu =====
# Server 1: Ana uygulama (panel + API)
# Server 2: Block page (DNS engelleme sayfasi)

# Server 1: Ana uygulama — belirli hostname'ler
server {
    listen 93;
    listen 80;
    listen 443 ssl;
    server_name guard.tonbilx.com wall.tonbilx.com 192.168.1.2 localhost;
    root /opt/tonbilaios/frontend/dist;
    index index.html;

    # SSL
    ssl_certificate /etc/letsencrypt/live/wall.tonbilx.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/wall.tonbilx.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Guvenlik basliklari (SPA + statik icin - API'de backend middleware halleder)
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self' https://wall.tonbilx.com https://guard.tonbilx.com http://wall.tonbilx.com http://guard.tonbilx.com wss: ws:; font-src 'self' data:; frame-ancestors 'none'" always;

    # API proxy - backend middleware guvenlik basliklarini ekler
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300;
        proxy_connect_timeout 60;
        proxy_send_timeout 60;

        # Nginx tarafindan eklenen guvenlik basliklarini kaldir
        # (backend middleware kendi ekler, duplicate onleme)
        proxy_hide_header X-Frame-Options;
        proxy_hide_header X-Content-Type-Options;
        proxy_hide_header X-XSS-Protection;
        proxy_hide_header Referrer-Policy;
        proxy_hide_header Strict-Transport-Security;
        proxy_hide_header Content-Security-Policy;

        # WebSocket destegi
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Swagger/OpenAPI
    location /docs {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /openapi.json {
        proxy_pass http://127.0.0.1:8000;
    }

    location /redoc {
        proxy_pass http://127.0.0.1:8000;
    }

    # Block page — HTTPS redirect sonrasi http://192.168.1.2/blocked.html?domain=X
    location = /blocked.html {
        add_header Content-Type "text/html; charset=utf-8" always;
        add_header Cache-Control "no-cache, no-store" always;
        try_files /blocked.html =404;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Statik dosyalar icin cache
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, no-transform";
        add_header X-Content-Type-Options nosniff;
    }
}

# Server 2: Block page — DNS engellenen domainler icin catch-all
server {
    listen 80 default_server;
    listen 443 ssl default_server;
    server_name _;
    root /opt/tonbilaios/frontend/dist;

    # Self-signed sertifika — HTTPS block page icin
    # Tarayici uyari gosterir ama "Devam Et" ile block page gorulur
    ssl_certificate /etc/tonbilaios/blockpage-cert.pem;
    ssl_certificate_key /etc/tonbilaios/blockpage-key.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    # HTTPS istekleri HTTP block page'e yonlendir
    # (HSTS olmayan siteler icin: cert uyarisi -> Devam Et -> redirect -> block page)
    if ($scheme = https) {
        return 302 http://192.168.1.2/blocked.html?domain=$host;
    }

    # HTTP block page
    location / {
        try_files /blocked.html =404;
        add_header Content-Type "text/html; charset=utf-8" always;
        add_header X-Block-Page "TonbilAiOS" always;
        add_header Cache-Control "no-cache, no-store" always;
    }

    # Block sebebi API proxy (auth gerektirmez)
    location /api/v1/dns/blockpage {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host 192.168.1.2;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # CORS — block page farkli domain'den fetch yapacak
        add_header Access-Control-Allow-Origin * always;
        add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type" always;

        if ($request_method = OPTIONS) {
            return 204;
        }
    }
}
